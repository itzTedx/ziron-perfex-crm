services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # MySQL service hostname in this compose network (not localhost)
      APP_DB_HOSTNAME: db
    volumes:
      # Persist config; empty volumes hide image files — entrypoint seeds from /opt/perfex-volume-defaults on first start.
      - app_config:/var/www/html/application/config
      - app_uploads:/var/www/html/uploads
      - app_temp:/var/www/html/temp
      - app_logs:/var/www/html/application/logs
      - app_cache:/var/www/html/application/cache
    networks:
      - perfex_network

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - perfex_network

volumes:
  app_config:
  app_uploads:
  app_temp:
  app_logs:
  app_cache:
  mysql_data:

networks:
  perfex_network:
    driver: bridge
